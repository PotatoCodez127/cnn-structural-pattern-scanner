name: Continuous Integration

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Linting and Quality Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black pytest

      - name: Enforce Package and Dependency Installation
        run: |
          pip install .

      - name: Enforce Black Code Formatting Codebase-Wide
        run: |
          black --check .

      - name: Execute Ruff Code Quality Engine
        run: |
          ruff check .

      - name: Execute Structural Verification Tests
        run: |
          pytest test_pipeline.py -v